---
- name: Install and configure UFW on Debian when firewall enabled
  when: ansible_facts.os_family == 'Debian' and enable_firewall
  block:
    - name: Install UFW package
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: true

    - name: Allow configured firewall ports
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
      loop: "{{ allowed_ports }}"

    - name: Enable UFW
      community.general.ufw:
        state: enabled

- name: Install and configure firewalld on RedHat when firewall enabled
  when: ansible_facts.os_family == 'RedHat' and enable_firewall
  block:
    - name: Install firewalld package
      ansible.builtin.yum:
        name: firewalld
        state: present

    - name: Ensure firewalld is running
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true

    - name: Open configured ports in firewalld
      ansible.posix.firewalld:
        port: "{{ item.port }}/{{ item.proto }}"
        permanent: true
        state: enabled
        immediate: true
      loop: "{{ allowed_ports }}"
