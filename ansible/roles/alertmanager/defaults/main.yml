---
alertmanager_version: 0.27.0
alertmanager_archive: "alertmanager-{{ alertmanager_version }}.linux-amd64.tar.gz"
alertmanager_download_url: "https://github.com/prometheus/alertmanager/releases/download/v{{ alertmanager_version }}/{{ alertmanager_archive }}"
alertmanager_install_dir: "/opt/alertmanager-{{ alertmanager_version }}"
alertmanager_current_dir: "/opt/alertmanager"
alertmanager_config_dir: "/etc/alertmanager"
alertmanager_data_dir: "/var/lib/alertmanager"
alertmanager_user: alertmanager
alertmanager_group: alertmanager
alertmanager_port: 9093
